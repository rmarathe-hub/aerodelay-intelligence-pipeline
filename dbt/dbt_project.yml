name: aerodelay
version: 1.0.0
config-version: 2

profile: aerodelay

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

models:
  aerodelay:
    staging:
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: view
      int_flights__weather_at_departure:
        +materialized: table
    marts:
      +schema: marts
      +materialized: view
      fct_flights:
        +materialized: table

seeds:
  aerodelay:
    +schema: intermediate

vars:
  missing_token: "M"
  trace_token: "T"
  weather_join_window_hours: 2
  # Set via --vars '{dev_year_month: "2025-01"}' for local 1-month proof runs
  dev_year_month: null
